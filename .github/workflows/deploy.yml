name: Build, Push and Deploy ToDo App

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out the repository code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into Docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            geoffreysakora/containerized-todo-app-api:latest
            geoffreysakora/containerized-todo-app-api:${{ github.sha }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            geoffreysakora/containerized-todo-app-frontend:latest
            geoffreysakora/containerized-todo-app-frontend:${{ github.sha }}

  deploy-to-server:
    needs: build-and-push
    runs-on: ubuntu-24.04
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            echo "Pulling newest images..."
            docker pull geoffreysakora/containerized-todo-app-api:latest
            docker pull geoffreysakora/containerized-todo-app-frontend:latest
            
            echo "Removing existing backend container if it exists..."
            docker stop containerized-todo-app-api-1 >/dev/null 2>&1 || true
            docker rm containerized-todo-app-api-1 >/dev/null 2>&1 || true
            
            echo "Removing existing frontend container if it exists..."
            docker stop containerized-todo-app-frontend-1 >/dev/null 2>&1 || true
            docker rm containerized-todo-app-frontend-1 >/dev/null 2>&1 || true
            
            echo "Launching backend app..."
            docker run -d --name containerized-todo-app-api-1 -p 8000:8000 geoffreysakora/containerized-todo-app-api:latest
            
            echo "Launching frontend app..."
            docker run -d --name containerized-todo-app-frontend-1 -p 80:80 geoffreysakora/containerized-todo-app-frontend:latest
