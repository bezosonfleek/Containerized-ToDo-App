services:

  # ── FastAPI app ──────────────────────────────────────────────────────────────
  api:
    build: .                          # Build from our Dockerfile
    ports:
      - "8000:8000"                   # localhost:8000 → container:8000
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: todos
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy    # Wait until Postgres is ready
    volumes:
      - ./app:/app/app               # Live reload: local changes reflect instantly

  # ── PostgreSQL database ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine         # Lightweight Postgres image
    environment:
      POSTGRES_DB: todos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data   # Persist data between restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

# ── Named volume ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
